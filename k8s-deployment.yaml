apiVersion: v1
kind: Namespace
metadata:
  name: quiz-arena
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quiz-app-config
  namespace: quiz-arena
data:
  NODE_ENV: "production"
  PORT: "3000"
  MATCH_TIMER: "15"
  ELO_K_FACTOR: "32"
---
apiVersion: v1
kind: Secret
metadata:
  name: quiz-app-secrets
  namespace: quiz-arena
type: Opaque
stringData:
  SUPABASE_URL: "your_supabase_url"
  SUPABASE_SERVICE_ROLE_KEY: "your_service_role_key"
  SUPABASE_ANON_KEY: "your_anon_key"
  GROQ_API_KEY: "your_groq_key"
  JWT_SECRET: "your_jwt_secret"
  SESSION_SECRET: "your_session_secret"
  ALLOWED_ORIGINS: "https://yourdomain.com"
  VITE_ALLOWED_ORIGINS: "https://yourdomain.com"
  VITE_SUPABASE_URL: "your_supabase_url"
  VITE_SUPABASE_ANON_KEY: "your_anon_key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-app
  namespace: quiz-arena
  labels:
    app: quiz-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quiz-app
  template:
    metadata:
      labels:
        app: quiz-app
    spec:
      containers:
      - name: quiz-app
        image: your-registry/quiz-challenge-arena:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: quiz-app-config
        - secretRef:
            name: quiz-app-secrets
        
        # Resource requests and limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /api/ping
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/ping
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        # Logs
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
      
      # Pod security context
      securityContext:
        fsGroup: 1001
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}
      
      # Pod anti-affinity (spread across different nodes)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - quiz-app
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-app-service
  namespace: quiz-arena
  labels:
    app: quiz-app
spec:
  type: LoadBalancer
  selector:
    app: quiz-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quiz-app-hpa
  namespace: quiz-arena
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quiz-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: quiz-app-pdb
  namespace: quiz-arena
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: quiz-app
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quiz-app-network-policy
  namespace: quiz-arena
spec:
  podSelector:
    matchLabels:
      app: quiz-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
  egress:
  - to:
    - namespaceSelector: {}
  - to:
    - podSelector: {}
  - ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

name: Keep Services Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-services:
    name: Ping hosted services
    runs-on: ubuntu-latest

    env:
      RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
      VERCEL_FRONTEND_URL: ${{ secrets.VERCEL_FRONTEND_URL }}

    steps:
      - name: Ping Render Backend
        run: |
          echo "Pinging Render backend..."
          curl -s -o /dev/null -w "HTTP %{http_code}\n" $RENDER_HEALTH_URL

      - name: Ping Vercel Frontend
        run: |
          echo "Pinging Vercel frontend..."
          curl -s -o /dev/null -w "HTTP %{http_code}\n" $VERCEL_FRONTEND_URL

name: Keep Services Awake

on:
  schedule:
    # GitHub Actions cron uses UTC. "*/5 * * * *" means every 5 minutes.
    # This is supported on the GitHub free plan for public repositories and
    # for private repositories within Actions usage limits.
    - cron: '*/5 * * * *'
  # Allows manual runs from the GitHub Actions tab for testing or ad hoc checks.
  # URLs provided as inputs take precedence over repository secrets/variables.
  workflow_dispatch:
    inputs:
      render_health_url:
        description: 'Render backend health URL (e.g. https://your-app.onrender.com/health). Overrides RENDER_HEALTH_URL secret/variable.'
        required: false
        default: ''
      vercel_frontend_url:
        description: 'Vercel frontend URL (e.g. https://your-app.vercel.app). Overrides VERCEL_FRONTEND_URL secret/variable.'
        required: false
        default: ''
      supabase_url:
        description: 'Supabase project URL (e.g. https://your-project.supabase.co). Overrides SUPABASE_URL secret/variable.'
        required: false
        default: ''

# Minimal permissions are enough because this workflow only reads configuration
# and makes outbound HTTP requests.
permissions:
  contents: read

jobs:
  ping-services:
    name: Ping hosted services
    runs-on: ubuntu-latest
    env:
      # Keep endpoint values outside the workflow so URLs are not hardcoded.
      # Each value can come from a workflow_dispatch input, a repository secret,
      # or a repository variable (checked in that order of priority).
      # To configure for scheduled runs, add RENDER_HEALTH_URL, VERCEL_FRONTEND_URL,
      # and/or SUPABASE_URL as repository secrets (Settings → Secrets and variables →
      # Actions → Secrets) or repository variables (Settings → Secrets and variables →
      # Actions → Variables).
      RENDER_HEALTH_URL_INPUT: ${{ inputs.render_health_url }}
      RENDER_HEALTH_URL_SECRET: ${{ secrets.RENDER_HEALTH_URL }}
      RENDER_HEALTH_URL_VAR: ${{ vars.RENDER_HEALTH_URL }}
      VERCEL_FRONTEND_URL_INPUT: ${{ inputs.vercel_frontend_url }}
      VERCEL_FRONTEND_URL_SECRET: ${{ secrets.VERCEL_FRONTEND_URL }}
      VERCEL_FRONTEND_URL_VAR: ${{ vars.VERCEL_FRONTEND_URL }}
      SUPABASE_URL_INPUT: ${{ inputs.supabase_url }}
      SUPABASE_URL_SECRET: ${{ secrets.SUPABASE_URL }}
      SUPABASE_URL_VAR: ${{ vars.SUPABASE_URL }}
    steps:
      - name: Ping configured endpoints
        shell: bash
        run: |
          set +e

          # Regular traffic helps reduce cold starts on free-tier platforms that
          # scale services down after inactivity.

          # Priority order: workflow_dispatch input > repository secret > repository variable.
          pick_value() {
            local input="$1"
            local secret="$2"
            local var="$3"

            if [ -n "$input" ]; then
              printf '%s' "$input"
            elif [ -n "$secret" ]; then
              printf '%s' "$secret"
            else
              printf '%s' "$var"
            fi
          }

          render_url="$(pick_value "$RENDER_HEALTH_URL_INPUT" "$RENDER_HEALTH_URL_SECRET" "$RENDER_HEALTH_URL_VAR")"
          vercel_url="$(pick_value "$VERCEL_FRONTEND_URL_INPUT" "$VERCEL_FRONTEND_URL_SECRET" "$VERCEL_FRONTEND_URL_VAR")"
          supabase_url="$(pick_value "$SUPABASE_URL_INPUT" "$SUPABASE_URL_SECRET" "$SUPABASE_URL_VAR")"

          # The bare Supabase project URL returns 404; append the REST API root
          # path which responds with 200 for a live project.
          supabase_ping_url=""
          if [ -n "$supabase_url" ]; then
            supabase_ping_url="${supabase_url%/}/rest/v1/"
          fi

          labels=(
            "Render backend"
            "Vercel frontend"
            "Supabase API"
          )

          urls=(
            "$render_url"
            "$vercel_url"
            "$supabase_ping_url"
          )

          failures=0
          configured_urls=0

          for url in "${urls[@]}"; do
            if [ -n "$url" ]; then
              configured_urls=$((configured_urls + 1))
            fi
          done

          # When no endpoints are configured, skip all checks and exit successfully.
          if [ "$configured_urls" -eq 0 ]; then
            echo "::warning::No keep-awake URLs are configured. To fix this, either:"
            echo "::warning::  1. Run this workflow manually (workflow_dispatch) and supply URLs in the input fields, OR"
            echo "::warning::  2. Add RENDER_HEALTH_URL, VERCEL_FRONTEND_URL, and/or SUPABASE_URL as repository secrets"
            echo "::warning::     (Settings → Secrets and variables → Actions → Secrets) for scheduled pinging."
            echo "No URLs configured – skipping keep-awake checks."
            exit 0
          fi

          for i in "${!labels[@]}"; do
            label="${labels[$i]}"
            url="${urls[$i]}"

            echo "Pinging ${label}..."

            if [ -z "$url" ]; then
              echo "::warning::${label} skipped because no URL is configured."
              continue
            fi

            http_code="$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' --max-time 25 "$url")"
            curl_exit_code=$?

            if [ "$curl_exit_code" -eq 0 ] && [ "$http_code" -ge 200 ] && [ "$http_code" -lt 400 ]; then
              echo "${label} responded with HTTP ${http_code}."
              echo "SUCCESS: ${label} is reachable."
            else
              echo "${label} responded with HTTP ${http_code:-000}."
              echo "FAILURE: ${label} ping failed, but the workflow will continue."
              echo "::warning::${label} ping failed with curl exit code ${curl_exit_code} and HTTP status ${http_code:-000}."
              failures=$((failures + 1))
            fi

            echo
          done

          # To add more endpoints later, append a new label and URL to the two
          # arrays above and populate the matching secret or repository variable.
          echo "Completed keep-awake checks with ${failures} failure(s)."
